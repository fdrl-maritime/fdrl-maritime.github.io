
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<style>
  .katex         { font-size: 1em; font-weight: 400; color: inherit; vertical-align: -0.04em; }
  .katex-display { margin: 1.4em 0; overflow: visible; }
  .katex-display > .katex { overflow: visible; }
  .algo-body .katex { font-size: 0.95em; vertical-align: 0; }

  @media (max-width: 768px) {
    .katex-display > .katex > .katex-html > .tag {
      position: relative;
      right: auto;
      margin-left: 1em;
    }
  }
</style>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {

    var roots = document.querySelectorAll('.project-content, .hero-abstract, .algo-body, .project-references, figcaption');
    var opts = {
      delimiters: [
        { left: "$$", right: "$$", display: true  },
        { left: "$",  right: "$",  display: false }
      ],
      throwOnError: false
    };
    if (roots.length) {
      roots.forEach(function (el) { renderMathInElement(el, opts); });
    } else {
      renderMathInElement(document.body, opts);
    }

    document.querySelectorAll('.katex-display').forEach(function (el) {
      if (el.parentNode && el.parentNode.classList.contains('math-scroll')) return;
      var wrap = document.createElement('div');
      wrap.className = 'math-scroll';
      el.parentNode.insertBefore(wrap, el);
      wrap.appendChild(el);
    });
  });
</script>
